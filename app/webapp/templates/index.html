<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BonuskaBet 2025</title>
  <link rel="stylesheet" href="/webapp/static/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topline">
      <div class="brand">🎁 BonuskaBet 2025</div>
    </header>

    <main class="slot-layout">
      <h1 class="attempts" id="attemptsLabel">Spin #1 | Left: 8</h1>

      <section class="slot-machine" aria-label="slot">
        <div class="reel"><div id="reel1" class="symbol">🍉</div></div>
        <div class="reel"><div id="reel2" class="symbol">🍒</div></div>
        <div class="reel"><div id="reel3" class="symbol">🔔</div></div>
      </section>

      <button id="spinBtn" class="spin-btn">PLAY</button>

      <section class="result" id="resultBox">
        <p id="resultText">Tap PLAY to claim your bonus.</p>
      </section>

      <ul class="prize-list" id="prizeList"></ul>
    </main>
  </div>

  <script src="/webapp/static/slot.js"></script>
</body>
</html>
